name: Downgrade
on:
  pull_request:
    branches:
      - master
    paths-ignore:
      - 'docs/**'
  push:
    branches:
      - master
    paths-ignore:
      - 'docs/**'
jobs:
  downgrade:
    if: false  # Disabled: see https://github.com/SciML/NeuralPDE.jl/issues/1023
    strategy:
      matrix:
        group:
          - NNPDE1
    uses: "SciML/.github/.github/workflows/downgrade.yml@v1"
    with:
      julia-version: "1.10"
      group: "${{ matrix.group }}"
      skip: "Pkg,TOML"
    secrets: "inherit"
