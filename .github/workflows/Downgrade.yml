name: Downgrade
on:
  pull_request:
    branches:
      - master
    paths-ignore:
      - 'docs/**'
  push:
    branches:
      - master
    paths-ignore:
      - 'docs/**'
jobs:
  downgrade:
    # Runs strict (allow_reresolve=false); expected RED until MCMCChains upstream
    # allows StatsFuns 2.x (StatsFuns 2.0.1 vs MCMCChains; NOT fixed by ForwardDiff).
    # Auto-greens on the upstream release. See SciML/NeuralPDE.jl#1023.
    strategy:
      matrix:
        group:
          - NNPDE1
    uses: "SciML/.github/.github/workflows/downgrade.yml@v1"
    with:
      julia-version: "1.10"
      group: "${{ matrix.group }}"
      skip: "Pkg,TOML"
    secrets: "inherit"
