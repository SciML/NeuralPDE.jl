name: Downgrade
on:
  pull_request:
    branches:
      - master
    paths-ignore:
      - 'docs/**'
  push:
    branches:
      - master
    paths-ignore:
      - 'docs/**'
jobs:
  downgrade:
    # Disabled: at the current compat floors the test sandbox cannot resolve with
    # allow-reresolve disabled. MCMCChains 7 (the only released major) caps
    # StatsFuns to "[0.8-0.9, 1]", but StatsFuns 2.x is now in the registry and the
    # transitive resolve of the main project pins StatsFuns 2.x; adding the
    # MCMCChains test dep then makes the sandbox unsatisfiable. Re-resolving would
    # paper over this by silently downgrading StatsFuns, which we do not want here.
    # Re-enable once an MCMCChains release allows StatsFuns 2.x. See SciML/NeuralPDE.jl#1023.
    if: false
    strategy:
      matrix:
        group:
          - NNPDE1
    uses: "SciML/.github/.github/workflows/downgrade.yml@v1"
    with:
      julia-version: "1.10"
      group: "${{ matrix.group }}"
      skip: "Pkg,TOML"
      allow-reresolve: false
    secrets: "inherit"
