name: Downgrade
on:
  pull_request:
    branches:
      - master
    paths-ignore:
      - 'docs/**'
  push:
    branches:
      - master
    paths-ignore:
      - 'docs/**'
jobs:
  downgrade:
    # Disabled (floor-unfixable): the test sandbox cannot resolve with
    # allow-reresolve disabled. In the main env, StatsFuns is pulled in only by
    # Distributions, and every Distributions >= 0.25.126 (the floor and all newer
    # releases) permits StatsFuns "2.0.1 - 2", so the resolver pins the latest
    # StatsFuns 2.0.1 in the main Manifest. Pkg.test then sandboxes from that
    # Manifest with StatsFuns 2.0.1 as a fixed requirement, but every MCMCChains
    # release (including 7.7.0, the latest) caps StatsFuns to "[0.8-0.9, 1]", so the
    # sandbox is Unsatisfiable. No direct-dep floor RAISE fixes this: only
    # Distributions constrains StatsFuns, and no Distributions >= 0.25.126 caps it
    # to <=1 (that cap only exists in 0.25.124-0.25.125, below our floor). Re-resolve
    # would silently downgrade StatsFuns to 1.5.2 (consistent, but reresolve is off).
    # Re-enable once an MCMCChains release allows StatsFuns 2.x. See SciML/NeuralPDE.jl#1023.
    if: false
    strategy:
      matrix:
        group:
          - NNPDE1
    uses: "SciML/.github/.github/workflows/downgrade.yml@v1"
    with:
      julia-version: "1.10"
      group: "${{ matrix.group }}"
      skip: "Pkg,TOML"
    secrets: "inherit"
